name: Sync Livescores

on:
  schedule:
    # Runs every 15 minutes. football-data.org's free tier is 10
    # requests/minute, and this script only uses 1 request per run, so this
    # interval is very safe. GitHub Actions cron timing is "best effort,"
    # not guaranteed to the minute.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync-livescores:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run livescore sync
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: node update-livescores.js
